#----------------------------------------------------------#
# Common processing parameters (shared across all missions)#
#----------------------------------------------------------#

########################
# SEC Processing Steps # 
########################
grid_for_elev_change:
  out_folder_name: gridded_altimetry
  area: 'greenland'
  gridarea: "greenland"
  binsize: 5000
  mask_name: 'greenland_icesheet_2km_grid_mask'
  standard_epoch: "1991-01-01T00:00:00"
  partition_xy_chunking: 200  # Number of grid cells in each partition

grid_for_elev_change_update_year:
  in_step: "grid_for_elev_change"
  update_year : 2018
  
surface_fit:  
  in_step: "grid_for_elev_change"
  out_folder_name: surface_fit
  min_vals_in_cell: 20 # run it with and then see 
  min_percent_timespan_in_cell: 70.0 #Maybe 
  n_sigma: 2.0 #  
  max_surfacefit_iterations: 30
  max_linearfit_iterations: 3
  weighted_surface_fit: false
  powercorrect : true # Is1 power correction Add is1 data. Run over greenland and see what happens.
  # Mission-specific parameters (mintime, maxtime, etc.) will be merged from missions section

surface_fit_plots:
  in_step: "surface_fit"
  out_folder_name: surface_fit_plots
  
epoch_average:
  in_step: "surface_fit"
  out_folder_name: epoch_average
  epoch_length: 30
  gia_model: "ice5g"
  partitioned: false

epoch_average_plots: 
  in_step: "epoch_average"
  out_folder_name: epoch_average_plots

clip_to_basins:
  in_step: "epoch_average"
  out_folder_name: epoch_average_basins
  region_selector: ['HUMBOLDT_GLETSCHER',
                    'STEENSBY_GLETSCHER',
                    'RYDER_GLETSCHER',
                    'HUMBOLDT_GLETSCHER',
                    'PETERMANN_GLETSCHER',
                    'NEWMAN_BUGT',
                    'PETERMANN_GLETSCHER_N']
  mask : 'greenland_icesheet_2km_grid_mask_mouginot2019_glaciers'

# clip_to_basins:
#   in_step: "epoch_average"
#   out_folder_name: epoch_average_30_basins
#   region_selector: ['Floating ice']
#   mask : 'greenland_bedmachine_v3_grid_mask'

clip_to_basins_from_shapefile:
  in_step: "epoch_average"
  out_folder_name: epoch_average_basins
  region_selector: ['all']
  shp_file_column: 'id'
  shapefile: "/home/willisc3/luna/CPOM/willisc3/petermann_paper_plots/petermann_boxes.shp"

interpolate_grids_of_dh:
  in_step: epoch_average
  out_folder_name: interpolated_epoch_average
  variables_in: ["dh_ave", "dh_stddev"]
  timestamp_column: "epoch_number"
  lo_filter: [None, "None"] 
  hi_filter: [None, "None"]
  basin_structure: True 
  region_selector : ['PETERMANN_GLETSCHER']
  
calculate_dhdt: 
  in_step: interpolate_grids_of_dh
  out_folder_name: single_mission_dhdt
  min_pts_in_period: 10
  min_period_coverage: 50 
  max_allowed_dhdt: 30 
  # dhdt_start: "2015/01/01"
  # dhdt_end: "2020/12/31"
  dh_avg_varname: "dh_ave"
  dh_stddev_varname: "dh_stddev"
  dh_time_varname: "epoch_midpoint_dt"
  dh_time_fractional_varname: "epoch_midpoint_fractional_yr"
  parquet_glob: "*.parquet"
  basin_structure: false 

dhdt_plots: 
  in_step: calculate_dhdt
  out_folder_name: single_mission_dhdt_plots
  parquet_glob: "*.parquet"
